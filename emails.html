<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Appreciation Emails | Md. Siddique Ahmed</title><style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI,sans-serif}body{background:#F6F8F2;color:#111827}header{background:#DBE4C6;padding:20px;text-align:center;box-shadow:0 2px 10px rgba(0,0,0,.1)}header h1{font-size:36px}header p{margin-top:8px;color:#555}.top{text-align:center;margin:25px}.back,.closeBtn{display:inline-block;padding:10px 18px;background:#111827;color:#fff;text-decoration:none;border:none;border-radius:8px;cursor:pointer;margin:5px}.viewer{display:flex;justify-content:center;align-items:center;margin:20px auto;max-width:1400px}.viewer img{width:85%;max-height:78vh;object-fit:contain;border-radius:15px;box-shadow:0 10px 25px rgba(0,0,0,.15)}.nav{font-size:45px;background:#DBE4C6;border:none;padding:12px 22px;border-radius:50%;cursor:pointer;margin:15px}.nav:hover{background:#cddcb0}footer{text-align:center;padding:30px;color:#666}
</style></head><body>
<header><h1>📧 Appreciation Emails</h1><p>Messages from Clients, Managers & Leadership</p></header>
<div class="top"><a class="back" href="index.html">← Back to Portfolio</a><button class="closeBtn" onclick="goBack()">✖ Close</button></div>
<div class="viewer"><button class="nav" onclick="prev()">❮</button><img id="img" src="emails/email1.PNG"><button class="nav" onclick="next()">❯</button></div>
<footer>© 2026 Md. Siddique Ahmed</footer>
<script>
const images=[];for(let i=1;i<=22;i++){images.push(`emails/email${i}.PNG`);}
let current=0;
function show(){document.getElementById('img').src=images[current];}
function next(){current=(current+1)%images.length;show();}
function prev(){current=(current-1+images.length)%images.length;show();}
function goBack(){window.location.href='index.html';}
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight')next();if(e.key==='ArrowLeft')prev();if(e.key==='Escape')goBack();});
</script></body></html>
